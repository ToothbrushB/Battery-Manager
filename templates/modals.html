<div class="modal fade" id="statusModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Status</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p>Network<i data-feather="bar-chart"></i><span id="networkStatus"></span></p>
                <p>Sync Status: <i class="bi"></i><span id="syncStatus"></span></p>
                <p>Last Sync: <span id="lastSync"></span></p>
                <button type="button" class="btn btn-primary" id="startSyncButton">
                    <span class="d-none spinner-border spinner-border-sm" aria-hidden="true"></span>
                    Start Sync
                </button>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="readerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">QR Reader</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="reader" width="600px"></div>
            </div>
            <div class="modal-footer">
                <label for="cameraSelect">Select Camera:</label>
                <select name="cameraSelect" id="cameraSelect" class="form-select" aria-label="Select camera"></select>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>


<div class="modal fade" id="batteryModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Info</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="batteryModalAlerts"></div>
                <div class="modal-body-text">
                    <form id="batteryUpdateForm">
                    <table>
                        <tr>
                            <td>Tag</td>
                            <td id="batteryModalAssetTag">Loading...</td>
                        </tr>
                        <tr>
                            <td>Purchase Date</td>
                            <td id="batteryModalPurchaseDate">Loading...</td> <!-- TODO using Intl.RelativeTimeFormat -->
                        </tr>
                    </table>
                    <table id="batteryModalCustomFields">

                    </table>
                        <label for="batteryStatusSelect" class="form-label mt-3">Update Battery Status</label>
                        <select class="form-select" aria-label="Update Battery Status" id="batteryStatusSelect"
                            name="batteryStatusSelect">
                            <option selected>Loading...</option>
                        </select>
                        <label for="batteryNotes" class="form-label mt-3">Notes</label>
                        <textarea class="form-control" id="batteryNotes" name="batteryNotes" rows="3"></textarea>
                        <label for="batteryLocationSelect" class="form-label mt-3">Location</label>
                        <select class="form-select" aria-label="Battery Location" id="batteryLocationSelect"
                            name="batteryLocation">
                            <option selected>Loading...</option>
                        </select>
                        <button type="submit" class="btn btn-primary mt-3">Update</button>
                    </form>
                </div>
                <div>
                    <canvas id="batteryModalChart"></canvas>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
